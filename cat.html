<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge Course: Cat Possession Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f4f7fb, #e9eef7);
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }

    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      max-width: 900px;
      width: 92%;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p.description {
      text-align: center;
      color: #6b7280;
      margin-bottom: 30px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      border-radius: 12px;
      border: none;
    }

    .pdf-frame {
      height: 500px;
    }

    .link-card {
      display: block;
      text-decoration: none;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      transition: 0.2s;
      color: inherit;
    }

    .link-card:hover {
      background: #ffffff;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .footer {
      text-align: center;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 20px;

</head>

<body>
  <div class="container">

      </iframe>
    </div>

    <!-- Certificate PDF -->
    <div class="section">
      <div class="section-title">Certificate</div>
      <iframe class="pdf-frame"
        src="https://github.com/demimomi/demimomi/raw/main/159_toshiki%20demizu_OK.pdf">

    <div class="footer">
      © 2026 Bridge Course Project
    </div>
